<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Debug</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div style="padding: 50px;">
        <h1>Theme Toggle Debug</h1>
        
        <div style="margin: 20px 0; padding: 20px; background: var(--bg-secondary); border-radius: 8px;">
            <p><strong>Current Theme:</strong> <span id="current-theme"></span></p>
            <p><strong>Background Color:</strong> <span id="bg-color"></span></p>
            <p><strong>Text Color:</strong> <span id="text-color"></span></p>
        </div>
        
        <button class="theme-toggle" aria-label="Toggle dark/light mode" style="margin: 20px 0;">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        
        <div id="log" style="margin-top: 20px; padding: 20px; background: var(--bg-secondary); border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto;">
            <strong>Event Log:</strong><br>
        </div>
    </div>
    
    <script>
        const html = document.documentElement;
        const themeToggle = document.querySelector('.theme-toggle');
        const logDiv = document.getElementById('log');
        const currentThemeSpan = document.getElementById('current-theme');
        const bgColorSpan = document.getElementById('bg-color');
        const textColorSpan = document.getElementById('text-color');
        
        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateDisplay() {
            const theme = html.getAttribute('data-theme');
            currentThemeSpan.textContent = theme || 'not set';
            
            const bgColor = getComputedStyle(document.body).backgroundColor;
            const textColor = getComputedStyle(document.body).color;
            
            bgColorSpan.textContent = bgColor;
            textColorSpan.textContent = textColor;
        }
        
        log('Page loaded');
        log(`Theme toggle button found: ${themeToggle ? 'YES ✓' : 'NO ✗'}`);
        
        // Check for saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        log(`Saved theme in localStorage: ${savedTheme}`);
        html.setAttribute('data-theme', savedTheme);
        log(`Set initial theme to: ${savedTheme}`);
        updateDisplay();
        
        if (themeToggle) {
            log('Adding click listener to theme toggle button');
            
            themeToggle.addEventListener('click', () => {
                log('🖱️ Theme toggle button CLICKED!');
                
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                log(`Changing theme: ${currentTheme} → ${newTheme}`);
                
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                
                log(`Theme changed successfully`);
                updateDisplay();
                
                // Animate button
                themeToggle.style.transform = 'rotate(360deg)';
                setTimeout(() => {
                    themeToggle.style.transform = '';
                }, 300);
            });
            
            log('Click listener added successfully ✓');
        } else {
            log('❌ ERROR: Theme toggle button not found!');
        }
        
        // Update display every second to show live changes
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
